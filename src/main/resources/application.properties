spring.application.name=file-concurrency-test

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/telemetry_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool optimization
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=HikariPool-Ingestion

# Enable Virtual Threads
spring.threads.virtual.enabled=true

# Spring JDBC schema initialization (run schema.sql on startup)
spring.sql.init.mode=always

# Disable Hibernate DDL auto and logs to maximize performance
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator and Prometheus configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
