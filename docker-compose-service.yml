version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: file-concurrency-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: file-concurrency-redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped

  app:
    build: .
    container_name: file-concurrency-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=telemetry_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    volumes:
      - ./data:/app/data
    restart: unless-stopped

networks:
  app-network:
    name: file-concurrency-network

volumes:
  postgres_data:
